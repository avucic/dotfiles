# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# GENERAL SETTINGS
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# Set default index for windows and panes to 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Enable xterm keys, allowing for more specific keybindings
set-option -gw xterm-keys on

# Use vi keybindings in status line (for commands and history)
set -g status-keys vi

# Use vi keybindings in copy mode
set-window-option -g mode-keys vi

# Increase history limit for scrollback buffer
set -g history-limit 30000

# Set default shell to the user's login shell
set -g default-shell "/bin/zsh" # Use zsh as the default shell for new panes

# Shorten escape time to 0ms for faster key response
set -g escape-time 0

# Add ~/bin to the PATH for all new panes/windows
setenv -g PATH "$HOME/bin:$PATH"

# Set default terminal for 256 colors and modern features
set -g default-terminal "tmux-256color"
# Ensure italic fonts are displayed correctly
set -as terminal-overrides ',xterm*:sitm=\E[3m'
# Enable true color support
set-option -ga terminal-overrides ",xterm-256color:Tc"
# Fix cursor shape for Neovim (changes between block, beam, and underline)
set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
# Enable undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Enable underscore colors (requires tmux-3.0)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ga terminal-overrides ',*:Ms=\E]52;c;%p2%s\7'
set -as terminal-features ',*:clipboard'

# Enable mouse support
set-option -g mouse on

# Update status line every 5 seconds
set-option -g status-interval 5

# Automatically rename windows based on current command/path
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Renumber windows automatically when one is closed
set-option -g renumber-windows on

# Set window titles
set-option -g set-titles on

# Allow applications to take control of the terminal
set -g allow-passthrough on
set -s set-clipboard external
set -g set-clipboard external
set -s set-clipboard on
# Required for some terminal/tmux versions to pass escape codes
set -as terminal-overrides ',xterm*:Ms=\\E]52;%p1%s;%p2%s\\7'

# Keep panes open when their command exits
set -g remain-on-exit off
# When a pane's command exits, if it's the last pane in the last window of a session, respawn; otherwise, kill the pane.
set-hook -g pane-died "if -F '#{&&:#{==:#{session_windows},1},#{==:#{window_panes},1}}' 'respawn-pane' 'kill-pane'"
# Don't exit from tmux when closing a session
set -g detach-on-destroy off

# set -g default-command "reattach-to-user-namespace -l $SHELL"

# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# KEY BINDINGS
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# Change prefix key from `C-b` to `` ` ``
unbind C-b
set -g prefix `
bind-key ` send-prefix

# Copy mode settings (vi style)
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy" # Copy to macOS clipboard
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"


# Reload tmux configuration with `prefix R`
bind R source-file ~/.tmux.conf \; display "Reloading config..."

# Window navigation
bind-key Tab next-window
bind-key S-Tab previous-window

# Apply even-horizontal layout with `prefix =`
bind = select-layout even-horizontal

# Custom command bindings
bind-key C-e run-shell "nvim-edit-tmux-output" # Edit tmux output in Neovim
bind-key t run-shell 'tmuxpopup' # Run a custom tmux popup script
bind-key "w" run-shell "sesh connect \"$(
  sesh list -t --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'j:down,k:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list -t --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Unbind default split-pane keys to use custom ones
unbind '"'
unbind %

# Mouse scrolling behavior
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Zoom pane with `prefix Space` or `Alt-Space`
bind-key -T prefix Space resize-pane -Z
bind-key -n M-space resize-pane -Z

bind-key -n 'M-h' select-pane -L
bind-key -n 'M-j' select-pane -D
bind-key -n 'M-k' select-pane -U
bind-key -n 'M-l' select-pane -R

# C-h/j/k/l always pass through to the app (nvim handles splits)
bind-key -n 'C-h' send-keys 'C-h'
bind-key -n 'C-j' send-keys 'C-j'
bind-key -n 'C-k' send-keys 'C-k'
bind-key -n 'C-l' send-keys 'C-l'

# Handle C-\ for older/newer tmux versions
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# Split windows with `prefix \` (horizontal) and `prefix -` (vertical)
# bind '\' split-window -h
# bind - split-window -v

# Split windows at current path with `Alt-/` (vertical) and `Alt-\` (horizontal)
bind-key -n M-/ split-window  -v -c "#{pane_current_path}" -l 20
bind-key -n M-\\ split-window -h -c "#{pane_current_path}"

# Resize panes with `Ctrl-Arrow` keys
# bind-key -n C-left resize-pane -L 10
# bind-key -n C-down resize-pane -D 5
# bind-key -n C-up resize-pane -U 10
# bind-key -n C-right resize-pane -R 5

# Resize panes with `prefix h,j,k,l` (repeatable)
bind-key -r h  resize-pane -L 10
bind-key -r j  resize-pane -D 5
bind-key -r k  resize-pane -U 10
bind-key -r l  resize-pane -R 5

# Kill pane/window without prompt with `prefix x` / `prefix X`
bind-key x kill-pane
bind-key X kill-window

# Cycle through layouts with `prefix Enter`
bind-key Enter next-layout

# split
bind '\' split-window -h
bind - split-window -v


# move pane
bind-key s move-pane -v 
bind-key v move-pane -h

bind-key S join-pane -v 
bind-key V join-pane -h

# --- pane-move mod (prefix + M to enter) ---
# Swap mod — prefix + M
bind-key M switch-client -T pane-move

bind-key -T pane-move -r h select-pane -m \; select-pane -L \; swap-pane \; select-pane -L \; select-pane -M \; switch-client -T pane-move
bind-key -T pane-move -r j select-pane -m \; select-pane -D \; swap-pane \; select-pane -D \; select-pane -M \; switch-client -T pane-move
bind-key -T pane-move -r k select-pane -m \; select-pane -U \; swap-pane \; select-pane -U \; select-pane -M \; switch-client -T pane-move
bind-key -T pane-move -r l select-pane -m \; select-pane -R \; swap-pane \; select-pane -R \; select-pane -M \; switch-client -T pane-move

bind-key -T pane-move q      switch-client -T root
bind-key -T pane-move Escape switch-client -T root

# APPEARANCE & THEME
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# Pane border styles
set -g pane-active-border-style bg=default,fg=magenta
set -g pane-border-style fg=green
set -g popup-border-style fg=#3a3e47

# Highlight current window in status line
set-window-option -g window-status-current-style fg=#61afef

# Onedark theme widgets (requires 'odedlaz/tmux-onedark-theme' plugin)
set -g @onedark_widgets "#{cpu_fg_color} Disk: #{disk_available} #{cpu_fg_color} CPU: #{cpu_icon}#{cpu_percentage} | Online: #{online_status}"

# set -gF @popup-id-format "#{b:pane_current_path}/{popup_name}"
set -g  @popup-autostart on

# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# PLUGINS
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# List of plugins (managed by TPM - Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'       # Provides sensible tmux defaults
set -g @plugin 'odedlaz/tmux-onedark-theme'      # Onedark theme for tmux
set -g @plugin 'roosta/tmux-fuzzback'           # Fuzzy finder for command history
set -g @plugin 'tmux-plugins/tmux-online-status' # Display network status
set -g @plugin 'tmux-plugins/tmux-cpu'           # Display CPU usage
# set -g @plugin '2kabhishek/tmux-tilit'
set -g @plugin 'laktak/extrakto'
set -g @plugin "loichyan/tmux-toggle-popup"
set -g @plugin 'yumiriam/tmux-disk'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
