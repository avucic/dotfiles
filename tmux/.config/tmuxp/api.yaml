session_name: api
start_directory: ~/Work/tabz/services/api
options:
  status-left: "#[fg=#282c34,bg=#61afef,bold] #S #{prefix_highlight}#[fg=#61afef,bg=#282c34,nobold,nounderscore,noitalics]"
  status-left-length: "100"
windows:
  - window_name: api
    focus: "true"
    layout: main-horizontal
    options:
      main-pane-height: "80%"
    panes:
      - focus: true
        shell_command:
          - sleep 0.5
          - dev-exec zsh
      - shell_command:
          - sleep 0.5
          - dev-exec zsh
      - shell_command:
  - window_name: docker
    panes:
      - shell_command:
          - sleep 0.3
          - lazydocker
